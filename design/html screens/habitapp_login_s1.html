
<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 12px; display: flex; justify-content: center;">
<div style="width: 380px; background: #fbf9f5; border-radius: 12px; min-height: 740px; overflow: hidden; position: relative; font-family: 'Manrope', system-ui, sans-serif;">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">

<div style="padding: 20px 24px 0;">
  <div style="display: flex; align-items: center; gap: 9px; margin-bottom: 48px;">
    <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
      <rect x="1" y="1" width="17" height="17" rx="4.5" stroke="#5b8a72" stroke-width="2.8" fill="#f3f1eb"/>
      <circle cx="30" cy="10" r="8.5" fill="#5b8a72"/>
      <rect x="1" y="22" width="17" height="17" rx="4.5" stroke="#5b8a72" stroke-width="2.8" fill="#f3f1eb"/>
      <rect x="22" y="22" width="17" height="17" rx="4.5" stroke="#5b8a72" stroke-width="2.8" fill="#f3f1eb"/>
    </svg>
    <span style="font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 13px; color: #446655; letter-spacing: 0.06em; text-transform: uppercase;">Habitapp</span>
  </div>

  <div style="margin-bottom: 40px; padding-right: 16px;">
    <h1 style="font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 30px; line-height: 1.18; color: #31332f; margin: 0 0 12px;">Welcome back.</h1>
    <p style="font-size: 15px; line-height: 1.55; color: #6b6d68; letter-spacing: 0.02rem; margin: 0;">Pick up where you left off.</p>
  </div>
</div>

<div style="padding: 0 24px;">
  <div style="background: #f3f1eb; border-radius: 2rem; padding: 28px 24px 32px;">

    <div style="margin-bottom: 24px;">
      <label style="display: block; font-size: 13px; font-weight: 500; color: #6b6d68; margin-bottom: 8px; padding-left: 4px;">Email</label>
      <div style="background: #e8e5dd; border-radius: 1.5rem; padding: 14px 18px;">
        <span style="font-size: 15px; color: #9a9c96;">you@example.com</span>
      </div>
    </div>

    <div style="margin-bottom: 14px;">
      <label style="display: block; font-size: 13px; font-weight: 500; color: #6b6d68; margin-bottom: 8px; padding-left: 4px;">Password</label>
      <div style="background: #e8e5dd; border-radius: 1.5rem; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;">
        <span style="font-size: 15px; color: #9a9c96;">Your password</span>
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
          <path d="M2.5 10s3.5-5 7.5-5 7.5 5 7.5 5-3.5 5-7.5 5-7.5-5-7.5-5z" stroke="#9a9c96" stroke-width="1.4" stroke-linecap="round"/>
          <circle cx="10" cy="10" r="2.5" stroke="#9a9c96" stroke-width="1.4"/>
        </svg>
      </div>
    </div>

    <div style="text-align: right; margin-bottom: 28px; padding-right: 4px;">
      <span style="font-size: 13px; color: #446655; font-weight: 500; cursor: pointer;">Forgot password?</span>
    </div>

    <button style="all: unset; box-sizing: border-box; display: flex; align-items: center; justify-content: center; width: 100%; padding: 18px 40px; border-radius: 999px; background: linear-gradient(135deg, #446655 0%, #6b9e7d 100%); color: #fff; font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 16px; cursor: pointer; gap: 10px;">
      Sign in
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M4 10h12M12 5l5 5-5 5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div style="text-align: center; margin-top: 24px;">
    <span style="font-size: 14px; color: #446655; font-weight: 500; cursor: pointer;">Create an account</span>
  </div>
</div>

</div>
</div>
