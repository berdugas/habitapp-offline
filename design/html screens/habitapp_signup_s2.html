<div style="max-width: 380px; margin: 0 auto; min-height: 780px; background: #fbf9f5; border-radius: var(--border-radius-lg); overflow: hidden; font-family: 'Manrope', sans-serif; position: relative;">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">

<div style="padding: 20px 24px 0;">
  <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 44px;">
    <div style="width: 40px; height: 40px; border-radius: 50%; background: #f3f1eb; display: flex; align-items: center; justify-content: center; cursor: pointer;">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <path d="M13 4l-6 6 6 6" stroke="#31332f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div style="display: flex; align-items: center; gap: 6px;">
      <div style="width: 8px; height: 4px; border-radius: 2px; background: #d3d1c7;"></div>
      <div style="width: 24px; height: 4px; border-radius: 2px; background: #446655;"></div>
      <div style="width: 8px; height: 4px; border-radius: 2px; background: #d3d1c7;"></div>
    </div>
  </div>

  <div style="margin-bottom: 40px; padding-right: 16px;">
    <h1 style="font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 30px; line-height: 1.18; color: #31332f; margin: 0 0 12px;">The person you want to be starts here.</h1>
    <p style="font-size: 15px; line-height: 1.55; color: #6b6d68; letter-spacing: 0.02rem; margin: 0;">One habit at a time.</p>
  </div>
</div>

<div style="padding: 0 24px;">
  <div style="background: #f3f1eb; border-radius: 2rem; padding: 28px 24px 32px;">

    <div style="margin-bottom: 24px;">
      <label style="display: block; font-size: 13px; font-weight: 500; color: #6b6d68; margin-bottom: 8px; padding-left: 4px;">Email</label>
      <div style="background: #e8e5dd; border-radius: 1.5rem; padding: 14px 18px;">
        <span style="font-size: 15px; color: #9a9c96;">you@example.com</span>
      </div>
    </div>

    <div style="margin-bottom: 32px;">
      <label style="display: block; font-size: 13px; font-weight: 500; color: #6b6d68; margin-bottom: 8px; padding-left: 4px;">Password</label>
      <div style="background: #e8e5dd; border-radius: 1.5rem; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;">
        <span style="font-size: 15px; color: #9a9c96;">Choose a password</span>
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
          <path d="M2.5 10s3.5-5 7.5-5 7.5 5 7.5 5-3.5 5-7.5 5-7.5-5-7.5-5z" stroke="#9a9c96" stroke-width="1.4" stroke-linecap="round"/>
          <circle cx="10" cy="10" r="2.5" stroke="#9a9c96" stroke-width="1.4"/>
        </svg>
      </div>
    </div>

    <button style="all: unset; box-sizing: border-box; display: flex; align-items: center; justify-content: center; width: 100%; padding: 18px 40px; border-radius: 999px; background: linear-gradient(135deg, #446655 0%, #6b9e7d 100%); color: #fff; font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 16px; cursor: pointer; gap: 10px;">
      Sign up
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
        <path d="M4 10h12M12 5l5 5-5 5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div style="text-align: center; margin-top: 24px;">
    <span style="font-size: 14px; color: #446655; font-weight: 500; cursor: pointer;">I already have an account</span>
  </div>
</div>
</div>
