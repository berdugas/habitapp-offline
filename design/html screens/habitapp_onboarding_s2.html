<div style="max-width: 380px; margin: 0 auto; min-height: 780px; background: #fbf9f5; border-radius: var(--border-radius-lg); overflow: hidden; font-family: 'Manrope', sans-serif; position: relative; display: flex; flex-direction: column;">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">

<div style="padding: 20px 24px 0;">
  <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 44px;">
    <div style="width: 40px; height: 40px; border-radius: 50%; background: #f3f1eb; display: flex; align-items: center; justify-content: center; cursor: pointer;">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <path d="M13 4l-6 6 6 6" stroke="#31332f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div style="display: flex; align-items: center; gap: 6px;">
      <div style="width: 24px; height: 4px; border-radius: 2px; background: #446655;"></div>
      <div style="width: 8px; height: 4px; border-radius: 2px; background: #d3d1c7;"></div>
      <div style="width: 8px; height: 4px; border-radius: 2px; background: #d3d1c7;"></div>
      <div style="width: 8px; height: 4px; border-radius: 2px; background: #d3d1c7;"></div>
      <div style="width: 8px; height: 4px; border-radius: 2px; background: #d3d1c7;"></div>
    </div>
  </div>

  <p style="font-size: 14px; line-height: 1.5; color: #446655; margin: 0 0 12px; font-weight: 500;">Habits stick when they connect to who you want to be.</p>

  <h1 style="font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 28px; line-height: 1.18; color: #31332f; margin: 0 0 28px;">Who do you want to become?</h1>
</div>

<div style="padding: 0 24px;">
  <label style="display: block; font-size: 13px; font-weight: 500; color: #446655; margin-bottom: 8px; padding-left: 4px;">Your answer</label>
  <div style="background: #ffffff; border-radius: 1.5rem; padding: 16px 18px; margin-bottom: 28px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 16px rgba(68, 102, 85, 0.06);">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none" style="flex-shrink: 0;">
      <path d="M14.5 2.5l3 3L6 17H3v-3L14.5 2.5z" stroke="#446655" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 5l3 3" stroke="#446655" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input id="identity-input" type="text" placeholder="Describe who you are becoming..." style="all: unset; flex: 1; font-size: 15px; color: #31332f; width: 100%;" />
  </div>

  <p style="font-size: 13px; color: #9a9c96; font-weight: 500; margin: 0 0 12px; padding-left: 4px;">Try one of these</p>

  <div id="chips" style="display: flex; flex-wrap: wrap; gap: 8px;">
    <div class="chip" style="background: #f3f1eb; border-radius: 999px; padding: 10px 18px; font-size: 14px; color: #31332f; cursor: pointer;">a runner</div>
    <div class="chip" style="background: #f3f1eb; border-radius: 999px; padding: 10px 18px; font-size: 14px; color: #31332f; cursor: pointer;">someone who reads daily</div>
    <div class="chip" style="background: #f3f1eb; border-radius: 999px; padding: 10px 18px; font-size: 14px; color: #31332f; cursor: pointer;">a calmer person</div>
    <div class="chip" style="background: #f3f1eb; border-radius: 999px; padding: 10px 18px; font-size: 14px; color: #31332f; cursor: pointer;">a better partner</div>
    <div class="chip" style="background: #f3f1eb; border-radius: 999px; padding: 10px 18px; font-size: 14px; color: #31332f; cursor: pointer;">someone who saves consistently</div>
    <div class="chip" style="background: #f3f1eb; border-radius: 999px; padding: 10px 18px; font-size: 14px; color: #31332f; cursor: pointer;">a writer</div>
    <div class="chip" style="background: #f3f1eb; border-radius: 999px; padding: 10px 18px; font-size: 14px; color: #31332f; cursor: pointer;">a present parent</div>
  </div>
</div>

<div style="flex: 1;"></div>

<div style="padding: 0 24px 48px;">
  <button id="continue-btn" disabled style="all: unset; box-sizing: border-box; display: flex; align-items: center; justify-content: center; width: 100%; padding: 18px 40px; border-radius: 999px; background: #d3d1c7; color: #9a9c96; font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 16px; cursor: not-allowed; gap: 10px; transition: all 0.3s ease;">
    Continue
    <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
      <path d="M4 10h12M12 5l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>
</div>

<script>
const input = document.getElementById('identity-input');
const btn = document.getElementById('continue-btn');
const chips = document.querySelectorAll('.chip');

function updateButton() {
  const hasValue = input.value.trim().length >= 2;
  if (hasValue) {
    btn.disabled = false;
    btn.style.background = 'linear-gradient(135deg, #446655 0%, #6b9e7d 100%)';
    btn.style.color = '#fff';
    btn.style.cursor = 'pointer';
  } else {
    btn.disabled = true;
    btn.style.background = '#d3d1c7';
    btn.style.color = '#9a9c96';
    btn.style.cursor = 'not-allowed';
  }
}

input.addEventListener('input', updateButton);

chips.forEach(chip => {
  chip.addEventListener('click', () => {
    chips.forEach(c => { c.style.background = '#f3f1eb'; c.style.color = '#31332f'; });
    chip.style.background = '#446655';
    chip.style.color = '#fff';
    input.value = chip.textContent;
    updateButton();
  });
});
</script>
